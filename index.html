<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Game view</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Register --open so it can interpolate smoothly.
       Every downstream derivation (main shift, panel slide, per-item stagger)
       inherits a single synchronized timeline. */
    @property --open {
      syntax: '<number>';
      initial-value: 0;
      inherits: true;
    }

    :root {
      /* Colors */
      --black: #000;
      --white: #fff;
      --white-08: rgba(255, 255, 255, 0.08);
      --white-12: rgba(255, 255, 255, 0.12);
      --white-40: rgba(255, 255, 255, 0.4);
      --white-64: rgba(255, 255, 255, 0.64);
      --deep-signal: #111b29;
      --deep-signal-06: rgba(17, 27, 41, 0.06);
      --lime-flash: #9eff78;
      --lime-flash-32: rgba(158, 255, 120, 0.32);
      --iframe-bg: #111111;

      /* Spacing */
      --gap-4: 4px;
      --gap-8: 8px;
      --gap-12: 12px;
      --gap-16: 16px;

      /* Radius */
      --radius-full: 9999px;
      --radius-lg: 20px;

      /* Type */
      --font-secondary: "DM Sans", sans-serif;

      /* Reveal drawer geometry */
      --panel-width: 88px;      /* full visual width of right nav */
      --content-shift: 84px;    /* how far the main content slides left */
      --thumb-size: 56px;
      --panel-padding: 16px;

      /* Drawer progress — 0 closed, 1 open; updated by JS during drag */
      --open: 0;
      --drag-duration: 260ms;
      --drag-ease: cubic-bezier(.22, .61, .36, 1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-secondary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      overflow: hidden; /* drawer handles its own overflow */
    }

    /* ---------- Reveal container ---------- */
    .reveal {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--black);
      /* isolate so child transforms don't paint outside during drag */
      isolation: isolate;
      /* Snap animation is driven by Motion One via JS (spring physics).
         Drag path writes --open directly. No CSS transition needed here. */
    }

    /* Main game view shifts left as drawer opens */
    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: var(--gap-16);
      gap: var(--gap-12);
      transform: translate3d(calc(var(--open) * calc(var(--content-shift) * -1)), 0, 0);
      will-change: transform;
    }

    /* Right-side vertical game list */
    .game-list {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: var(--panel-width);
      /* Closed: panel sits fully off-screen to the right.
         Open: panel slides in to rest flush with the right edge. */
      transform: translate3d(calc(var(--panel-width) * (1 - var(--open))), 0, 0);
      will-change: transform;
      border-left: 1px solid var(--white-08);
    }

    .game-list-scroll {
      height: 100%;
      padding: var(--panel-padding);
      display: flex;
      flex-direction: column;
      gap: var(--gap-16);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .game-list-scroll::-webkit-scrollbar { display: none; }

    .game-thumb {
      flex: 0 0 auto;
      width: var(--thumb-size);
      height: var(--thumb-size);
      border-radius: 16px;
      overflow: hidden;
      background: var(--white-08);
      display: block;
      position: relative;
      cursor: pointer;
      border: 0;
      padding: 0;
      /* Start hidden — Motion stagger plays the entrance top→bottom */
      opacity: 0;
      transform: translate3d(0, 12px, 0);
      will-change: transform, opacity;
    }
    .game-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Bottom fade masking scroll content */
    .game-list-fade {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 145px;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, #000 88%);
    }

    /* Right-edge grab zone — only active when closed */
    .edge-grab {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 24px;
      z-index: 3;
      touch-action: none; /* we own this gesture */
    }
    .reveal.open .edge-grab { display: none; }

    /* When open, a transparent scrim covers the main content to absorb taps
       and swipe-to-close. No visual dim. */
    .scrim {
      position: absolute;
      inset: 0;
      right: var(--panel-width);
      z-index: 2;
      display: none;
      touch-action: none;
    }
    .reveal.open .scrim { display: block; }

    /* ---------- Header ---------- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--gap-8);
    }
    .header-lead,
    .header-aside {
      display: flex;
      align-items: center;
      gap: var(--gap-8);
    }

    .icon-btn {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      color: currentColor;
      transition: transform 120ms ease, background-color 120ms ease;
    }
    .icon-btn:active { transform: scale(0.96); }
    .icon-btn:focus-visible {
      outline: 2px solid var(--lime-flash);
      outline-offset: 2px;
    }
    .icon-btn.md { width: 44px; height: 44px; }
    .icon-btn.lg { width: 56px; height: 56px; }
    .icon-btn.surface-light {
      background: var(--white);
      color: var(--deep-signal);
      /* Figma Shadow/Default — two-layer elevation on light-on-dark buttons */
      box-shadow:
        0 1px 2px 0 rgba(0, 0, 0, 0.12),
        0 0 1px 0 rgba(0, 0, 0, 0.18);
    }
    .icon-btn.surface-outline {
      background: var(--white-12);
      color: var(--white);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Rakeback pill */
    .rakeback {
      display: inline-flex;
      align-items: center;
      gap: var(--gap-4);
      padding: var(--gap-12);
      background: var(--white-12);
      border-radius: var(--radius-full);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0;
      color: var(--white);
      font-family: var(--font-secondary);
      font-weight: 700;
      font-size: 14px;
      line-height: 20px;
      cursor: pointer;
    }
    .rakeback .coin {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 12px var(--lime-flash-32));
    }
    .rakeback .amount { padding: 0 var(--gap-4); }

    /* ---------- Game iframe area ---------- */
    .game {
      flex: 1 1 auto;
      background: var(--iframe-bg);
      border-radius: var(--radius-lg);
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    .game iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* ---------- Bottom dock ---------- */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--gap-8);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .island {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      background: var(--white-12);
      border-radius: var(--radius-full);
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .island-btn {
      appearance: none;
      border: 0;
      background: transparent;
      width: 52px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      cursor: pointer;
      border-radius: var(--radius-full);
      transition: background-color 120ms ease, transform 120ms ease;
    }
    .island-btn:active { transform: scale(0.94); }
    .island-btn:focus-visible { outline: 2px solid var(--lime-flash); outline-offset: -2px; }
    .island-btn.active { background: var(--deep-signal-06); }

    /* ---------- Session timer ---------- */
    .session-timer {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom) + 4px);
      font-family: var(--font-secondary);
      font-size: 10px;
      line-height: 12px;
      color: var(--white-40);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      user-select: none;
      z-index: 4;
    }

    .i24 { width: 24px; height: 24px; display: block; }
    .i20 { width: 20px; height: 20px; display: block; }

</style>
</head>
<body>
  <div class="reveal" id="reveal">

    </main>

    <!-- ============ Right-side game list panel ============ -->

    <!-- Scrim: catches taps / close-swipe on the main content while open -->
    <div class="scrim" id="scrim" aria-hidden="true"></div>

    <!-- Right-edge grab strip: starts the open gesture -->
    <div class="edge-grab" id="edgeGrab" aria-hidden="true"></div>

    <!-- Session timer -->
    <div class="session-timer" aria-label="Session duration">00:50</div>
  </div>

  <script type="module">
    // Motion One — vanilla-JS sibling of Framer Motion (same spring engine,
    // same author). Pulled from ESM CDN; no build step.
    import { animate, stagger } from "https://cdn.jsdelivr.net/npm/motion@11.11.17/+esm";

    const reveal   = document.getElementById('reveal');
    const gameList = document.getElementById('gameList');
    const edgeGrab = document.getElementById('edgeGrab');
    const scrim    = document.getElementById('scrim');

    const PANEL = 88;                  // must match --panel-width
    const VELOCITY_SNAP = 0.5;         // px/ms flick threshold
    const DISTANCE_SNAP = PANEL * 0.3; // commit when past 30% of panel

    // Spring for the panel slide — firm but with a touch of settle.
    const PANEL_SPRING = { type: 'spring', stiffness: 380, damping: 34, mass: 1 };

    // Item entrance: top → bottom, one-by-one. 50ms between items × 12 items
    // = 550ms total cascade, each item's own fade/slide is 320ms.
    const ITEM_ENTER_EACH = { duration: 0.32, easing: [0.2, 0.7, 0.2, 1] };
    const ITEM_STAGGER    = 0.05;

    const thumbs = Array.from(document.querySelectorAll('.game-thumb'));

    let state = 'closed';   // 'closed' | 'open'
    let dragging = false;
    let startX = 0, startY = 0, lastX = 0, lastT = 0;
    let velocity = 0;
    let basePx = 0;
    let pointerId = null;
    let axisLocked = null;  // 'x' | 'y' | null
    let panelAnim = null;   // Motion handle for --open (panel slide)
    let itemsAnim = null;   // Motion handle for item stagger

    const readOpen = () =>
      parseFloat(getComputedStyle(reveal).getPropertyValue('--open')) || 0;

    const writeOpen = (v) => {
      const clamped = Math.max(0, Math.min(1, v));
      reveal.style.setProperty('--open', String(clamped));
    };

    const setOpenPx = (px) => writeOpen(px / PANEL);

    // Hide all thumbs instantly (used when closing or on init).
    const resetThumbs = () => {
      itemsAnim?.stop?.();
      for (const el of thumbs) {
        el.style.opacity = '0';
        el.style.transform = 'translate3d(0, 12px, 0)';
      }
    };

    // Play the staggered entrance — top item first, then each successive one
    // after ITEM_STAGGER seconds. Uses Motion's stagger() helper.
    const playItemStagger = () => {
      itemsAnim?.stop?.();
      itemsAnim = animate(
        thumbs,
        { opacity: [0, 1], transform: ['translate3d(0,12px,0)', 'translate3d(0,0,0)'] },
        { ...ITEM_ENTER_EACH, delay: stagger(ITEM_STAGGER) }
      );
    };

    // Commit to an end state.
    //   • Panel slide: spring-animated --open (CSS calc shifts main + panel)
    //   • Items: Motion stagger on open; instant hide on close
    const snapTo = (target /* 0 | 1 */) => {
      panelAnim?.stop?.();
      const newState = target === 1 ? 'open' : 'closed';
      const wasState = state;
      state = newState;
      reveal.classList.toggle('open', newState === 'open');
      gameList.setAttribute('aria-hidden', newState === 'open' ? 'false' : 'true');
      if ('inert' in gameList) gameList.inert = newState !== 'open';
      scrim.setAttribute('aria-hidden', newState === 'open' ? 'false' : 'true');

      // Panel slide — animate the registered custom property with a spring.
      // Keyframe array lets us start exactly from drag-released position.
      panelAnim = animate(
        reveal,
        { '--open': [readOpen(), target] },
        PANEL_SPRING
      );

      // Items
      if (newState === 'open') {
        playItemStagger();
      } else if (wasState === 'open') {
        // Closing: fade items quickly so they don't linger past the panel.
        itemsAnim?.stop?.();
        itemsAnim = animate(
          thumbs,
          { opacity: 0, transform: 'translate3d(0,12px,0)' },
          { duration: 0.15, easing: 'easeIn' }
        );
      }
    };

    const onPointerDown = (e) => {
      if (e.button != null && e.button !== 0) return;
      pointerId = e.pointerId;
      dragging = true;
      axisLocked = null;
      startX = lastX = e.clientX;
      startY = e.clientY;
      lastT = e.timeStamp;
      velocity = 0;
      basePx = readOpen() * PANEL;
      // Cancel any in-flight spring so drag takes over cleanly
      panelAnim?.stop?.();
      e.target.setPointerCapture?.(pointerId);
    };

    const onPointerMove = (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      // Axis lock: if the first significant move is vertical, release and let
      // native vertical scroll inside the panel (or the main view) take over.
      if (axisLocked == null) {
        if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
        axisLocked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        if (axisLocked === 'y') { dragging = false; return; }
      }

      e.preventDefault();

      // Leftward drag (negative dx) opens. Express as positive panel-px offset.
      setOpenPx(basePx + (-dx));

      // Smoothed velocity for flick detection (leftward positive, px/ms)
      const dt = Math.max(1, e.timeStamp - lastT);
      const instV = (lastX - e.clientX) / dt;
      velocity = velocity * 0.7 + instV * 0.3;
      lastX = e.clientX;
      lastT = e.timeStamp;
    };

    const onPointerUp = (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      dragging = false;
      e.target.releasePointerCapture?.(pointerId);
      pointerId = null;

      if (axisLocked !== 'x') {
        // Not a horizontal drag — treat tap on scrim as close.
        if (state === 'open' && e.currentTarget === scrim) snapTo(0);
        return;
      }

      const currentPx = readOpen() * PANEL;
      let shouldOpen;
      if (velocity > VELOCITY_SNAP)  shouldOpen = true;   // flick left
      else if (velocity < -VELOCITY_SNAP) shouldOpen = false; // flick right
      else shouldOpen = currentPx > DISTANCE_SNAP;

      snapTo(shouldOpen ? 1 : 0);
    };

    const onPointerCancel = () => {
      if (!dragging) return;
      dragging = false;
      snapTo(state === 'open' ? 1 : 0); // restore last committed
    };

    for (const el of [edgeGrab, scrim]) {
      el.addEventListener('pointerdown',   onPointerDown);
      el.addEventListener('pointermove',   onPointerMove);
      el.addEventListener('pointerup',     onPointerUp);
      el.addEventListener('pointercancel', onPointerCancel);
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && state === 'open') snapTo(0);
    });
    scrim.addEventListener('click', () => { if (state === 'open') snapTo(0); });

    // Initial state — closed, no animation
    writeOpen(0);
    resetThumbs();
    if ('inert' in gameList) gameList.inert = true;
  </script>
</body>
</html>
